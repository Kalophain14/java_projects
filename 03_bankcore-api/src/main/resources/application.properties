# Application
spring.application.name=bankcore-api
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/bankcore
spring.datasource.username=${DB_USER:bankcore}
spring.datasource.password=${DB_PASSWORD:bankcore123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=${JWT_SECRET:bankcore-super-secret-key-that-needs-to-be-at-least-256-bits-long-for-hs256-algorithm}
jwt.expiration=86400000

# Logging
logging.level.com.bankcore=INFO
logging.level.org.springframework.security=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
